<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fluxgram | Chat</title>

  <meta name="theme-color" content="#111827">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="toast-container"></div>
  <div id="global-loader" class="loader-overlay hidden"><div class="spinner"></div></div>

  <div class="app-shell">
    <div class="app-container app-frame chat-frame">
      <div class="header app-header chat-topbar">
        <button class="icon-btn" onclick="window.location.href='dashboard.html'" style="margin-right:10px;">
          <i class="fas fa-arrow-left"></i>
        </button>

        <div class="chat-header-info">
          <div class="avatar" id="chat-avatar"></div>
          <div class="chat-header-text">
            <div class="chat-name" id="chat-name">Loading...</div>
            <div class="chat-status" id="chat-status">Connecting...</div>
          </div>
        </div>

        <div class="chat-header-actions">
          <button class="icon-btn"><i class="fas fa-link"></i></button>
        </div>
      </div>

      <div class="chat-bg mobile-chat-bg">
        <div class="messages-container" id="messages-container"></div>

        <div id="reply-preview-bar" class="reply-preview-bar hidden">
          <div style="flex:1; overflow:hidden;">
            <div id="reply-preview-name" class="reply-preview-name">Name</div>
            <div id="reply-preview-text" class="reply-preview-text">Text</div>
          </div>
          <button class="icon-btn" onclick="window.FluxgramV41?.chat?.cancelReply()">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="input-area mobile-input-area" id="input-area">
          <div class="input-wrapper" id="input-wrapper">
            <textarea id="msg-input" class="msg-input" rows="1" placeholder="Message"></textarea>
          </div>

          <button class="icon-btn hidden" id="btn-send-text" onclick="window.FluxgramV41?.chat?.send()">
            <i class="fas fa-paper-plane send-icon"></i>
          </button>

          <button class="icon-btn" id="btn-record-voice">
            <i class="fas fa-microphone"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="msg-action-modal" class="hidden action-sheet-backdrop">
    <div class="action-sheet">
      <h3 class="action-sheet-title">Message Options</h3>

      <button id="btn-reply-msg" class="sheet-btn accent-btn">
        <i class="fas fa-reply"></i> Reply
      </button>

      <button id="btn-delete-everyone" class="sheet-btn danger-btn">
        <i class="fas fa-trash-alt"></i> Delete for everyone
      </button>

      <button id="btn-delete-me" class="sheet-btn">
        <i class="fas fa-eraser"></i> Delete for me
      </button>

      <button onclick="document.getElementById('msg-action-modal').classList.add('hidden')" class="sheet-btn muted-btn">
        Cancel
      </button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
