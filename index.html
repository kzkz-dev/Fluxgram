<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fluxgram | Login</title>

  <meta name="theme-color" content="#111827">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="toast-container"></div>
  <div id="global-loader" class="loader-overlay hidden"><div class="spinner"></div></div>

  <div class="app-shell auth-shell">
    <div class="auth-wrapper">
      <div class="auth-card glass-card">
        <div class="auth-brand">
          <div class="auth-brand-orb"><i class="fas fa-bolt"></i></div>
          <div>
            <div class="auth-title">Fluxgram</div>
            <div class="auth-tag">Login to continue</div>
          </div>
        </div>

        <div id="app-error" class="hidden" style="margin-bottom:14px; padding:12px; border-radius:12px; background:rgba(255,59,48,.12); color:#ff8a84; font-size:.9rem;"></div>

        <div id="login-form">
          <input type="email" id="login-email" class="auth-input" placeholder="Email Address" required>
          <input type="password" id="login-password" class="auth-input" placeholder="Password" required>
          <button class="auth-btn" onclick="window.FluxgramV41?.auth?.login()">Sign In</button>
          <div class="auth-link" onclick="window.FluxgramV41?.ui?.toggleForms('signup')">Create an Account</div>
          <div class="auth-link muted-link" onclick="window.FluxgramV41?.ui?.toggleForms('reset')">Forgot Password?</div>
        </div>

        <div id="signup-form" class="hidden">
          <input type="text" id="signup-username" class="auth-input" placeholder="Username (Unique)" required>
          <input type="email" id="signup-email" class="auth-input" placeholder="Email Address" required>
          <input type="password" id="signup-password" class="auth-input" placeholder="Password (Min 6 chars)" required>
          <button class="auth-btn" onclick="window.FluxgramV41?.auth?.signup()">Sign Up</button>
          <div class="auth-link" onclick="window.FluxgramV41?.ui?.toggleForms('login')">Already have an account? Sign In</div>
        </div>

        <div id="reset-form" class="hidden">
          <input type="email" id="reset-email" class="auth-input" placeholder="Enter Email Address" required>
          <button class="auth-btn" onclick="window.FluxgramV41?.auth?.reset()">Send Reset Link</button>
          <div class="auth-link" onclick="window.FluxgramV41?.ui?.toggleForms('login')">Back to Sign In</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const errorBox = document.getElementById("app-error");

    import("./main.js").catch((err) => {
      console.error("main.js failed:", err);
      errorBox.classList.remove("hidden");
      errorBox.textContent = "App failed to load: " + (err?.message || err);
    });

    window.addEventListener("error", (e) => {
      console.error("window error:", e.error || e.message);
      errorBox.classList.remove("hidden");
      errorBox.textContent = "Runtime error: " + (e.message || "Unknown error");
    });
  </script>
</body>
</html>
