<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fluxgram | Dashboard</title>

  <meta name="theme-color" content="#111827">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="toast-container"></div>
  <div id="global-loader" class="loader-overlay hidden"><div class="spinner"></div></div>

  <div class="app-shell">
    <div class="app-container app-frame">
      <div class="header app-header">
        <div class="brand-block">
          <div class="brand-orb"><i class="fas fa-bolt"></i></div>
          <div>
            <div class="header-title flux-logo-title">Fluxgram</div>
            <div class="header-subtitle">Your chats</div>
          </div>
        </div>

        <div class="dashboard-actions">
          <button class="icon-btn" onclick="window.FluxgramV41?.profile?.openMyProfile()">
            <i class="fas fa-user-circle"></i>
          </button>
          <button class="icon-btn" onclick="document.getElementById('create-modal').classList.remove('hidden')">
            <i class="fas fa-users"></i>
          </button>
          <button class="icon-btn" onclick="window.FluxgramV41?.auth?.logout()">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>

      <div class="search-bar sticky-surface">
        <div class="search-input-wrap">
          <i class="fas fa-search"></i>
          <input
            type="text"
            id="search-input"
            placeholder="Search @username or public chat..."
            oninput="window.FluxgramV41?.dash?.search()"
          >
        </div>
      </div>

      <div class="scroll-area dashboard-scroll">
        <div id="search-results" class="hidden search-results"></div>

        <div id="chat-list">
          <div class="skeleton-chat">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-info">
              <div class="skeleton-line-1"></div>
              <div class="skeleton-line-2"></div>
            </div>
          </div>

          <div class="skeleton-chat">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-info">
              <div class="skeleton-line-1" style="width:40%"></div>
              <div class="skeleton-line-2" style="width:70%"></div>
            </div>
          </div>

          <div class="skeleton-chat">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-info">
              <div class="skeleton-line-1" style="width:50%"></div>
              <div class="skeleton-line-2" style="width:60%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="create-modal" class="hidden modal-backdrop">
    <div class="modal-card sheet-card">
      <h2 class="modal-title">Create New</h2>

      <div class="switch-row">
        <button id="btn-type-group" onclick="window.FluxgramV41?.dash?.setCreateType('group')" class="switch-btn active">Group</button>
        <button id="btn-type-channel" onclick="window.FluxgramV41?.dash?.setCreateType('channel')" class="switch-btn">Channel</button>
      </div>

      <input type="hidden" id="create-type" value="group">
      <input type="text" id="create-name" class="auth-input compact" placeholder="Name (e.g. Flux Devs)">
      <input type="text" id="create-username" class="auth-input compact" placeholder="Public @username">
      <textarea id="create-desc" class="auth-input compact" rows="2" style="resize:none;" placeholder="Description"></textarea>

      <div class="modal-actions">
        <button onclick="document.getElementById('create-modal').classList.add('hidden')" class="ghost-btn">Cancel</button>
        <button onclick="window.FluxgramV41?.dash?.createChat()" class="accent-btn-fill">Create</button>
      </div>
    </div>
  </div>

  <div id="my-profile-modal" class="hidden my-profile-modal">
    <div class="header profile-header">
      <button class="icon-btn" onclick="document.getElementById('my-profile-modal').classList.add('hidden')">
        <i class="fas fa-arrow-left"></i>
      </button>
      <div style="flex:1;"></div>
      <button class="icon-btn"><i class="fas fa-ellipsis-v"></i></button>
    </div>

    <div id="my-profile-view-state" class="smooth-fade my-profile-view">
      <div class="my-profile-top">
        <div class="avatar my-profile-avatar" id="my-display-avatar">U</div>
        <h2 id="my-display-name">Name</h2>
        <div class="online-badge"><i class="fas fa-shield-alt"></i> online</div>

        <div class="my-profile-action-row">
          <div class="my-action-btn" onclick="document.getElementById('instant-avatar-input').click()">
            <i class="fas fa-camera"></i>
            <span>Set Photo</span>
          </div>
          <input type="file" id="instant-avatar-input" accept="image/*" class="hidden" onchange="window.FluxgramV41?.profile?.instantAvatarUpload(event)">
        </div>
      </div>

      <div style="padding:0 15px;">
        <div class="info-card">
          <div class="info-row">
            <div class="val" id="my-display-email">email@email.com</div>
            <div class="lbl">Email Address</div>
          </div>
          <div class="info-row">
            <div class="val" id="my-display-bio">Available on Fluxgram</div>
            <div class="lbl">Bio</div>
          </div>
          <div class="info-row">
            <div class="val" id="my-display-username">@username</div>
            <div class="lbl">Username</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
